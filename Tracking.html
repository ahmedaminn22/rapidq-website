<!DOCTYPE html>
<head>
<title>RapidQ - Tracking</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #dce8f5;
    min-height: 100vh;
  }

  nav {
    background: #dce8f5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 56px;
  }

  .nav-actions { display: flex; gap: 14px; align-items: center; }

  .btn {
    padding: 12px 32px;
    border-radius: 11px;
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s;
    text-decoration: none !important;
    display: inline-block;
  }
  .btn:hover { opacity: 0.85; }
  .btn-outline { background: #2563eb; color: #fff; border: 2px solid #2563eb; }
  .btn-dark { background: #111; color: #fff; }

  .main {
    padding: 30px 56px 60px;
    display: grid;
    grid-template-columns: 1fr 2.2fr;
    gap: 28px;
    max-width: 1920px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border-radius: 28px;
    padding: 50px 40px;
  }

  .clinic-title { font-size: 40px; font-weight: 800; color: #111; margin-bottom: 20px; }
  .clinic-name { display: flex; align-items: center; gap: 10px; font-size: 23px; font-weight: 600; color: #2563eb; margin-bottom: 5px; }
  .clinic-location { font-size: 17px; color: #2563eb; margin-bottom: 36px; }
  .clinic-stats { background: #f3f4f6; border-radius: 18px; padding: 22px 24px; display: flex; flex-direction: column; gap: 16px; }
  .stat-row { display: flex; align-items: center; gap: 10px; font-size: 18px; color: #333; }
  .dot-green { width: 13px; height: 13px; background: #22c55e; border-radius: 50%; flex-shrink: 0; }
  .stat-row span { font-weight: 600; }

  .queue-numbers { display: grid; grid-template-columns: 1fr 1fr; text-align: center; margin-bottom: 40px; }
  .queue-label { font-size: 24px; font-weight: 700; color: #2563eb; margin-bottom: 4px; }
  .queue-number { font-size: 110px; font-weight: 800; color: #111; line-height: 1; }

  .wait-section { text-align: center; margin-bottom: 36px; }
  .wait-label { font-size: 24px; font-weight: 700; color: #2563eb; margin-bottom: 4px; }
  .wait-time { font-size: 60px; font-weight: 800; color: #111; margin-bottom: 6px; }
  .wait-sub { font-size: 18px; color: #2563eb; font-weight: 500; }

  .progress-wrap { background: #e5e7eb; border-radius: 999px; height: 20px; margin-bottom: 28px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: #2563eb; border-radius: 999px; transition: width 0.5s ease; }

  .alert-banner { background: #f3f4f6; border-radius: 14px; padding: 20px 28px; text-align: center; font-size: 20px; color: #333; margin-bottom: 40px; }

  .actions { display: flex; justify-content: flex-end; gap: 18px; }
  .btn-refresh { background: #fff; color: #111; border: 2px solid #ccd6e0; padding: 16px 40px; border-radius: 14px; font-size: 20px; font-weight: 600; cursor: pointer; }
  .btn-cancel { background: #e02020; color: #fff; border: none; padding: 16px 40px; border-radius: 14px; font-size: 20px; font-weight: 600; cursor: pointer; }
  .btn-refresh:hover { background: #f3f4f6; }
  .btn-cancel:hover { background: #c01a1a; }

  @media (max-width: 480px) {
    nav { padding: 14px 16px; }
    nav img { width: 130px !important; }
    .btn { padding: 8px 14px; font-size: 14px; }
    .main { padding: 14px 14px 30px; gap: 14px; grid-template-columns: 1fr; }
    .card { padding: 22px 18px; border-radius: 16px; }
    .clinic-title { font-size: 22px; margin-bottom: 12px; }
    .clinic-name { font-size: 17px; }
    .clinic-location { font-size: 13px; margin-bottom: 18px; }
    .queue-label { font-size: 18px; }
    .queue-number { font-size: 64px; }
    .wait-label { font-size: 18px; }
    .wait-time { font-size: 36px; }
    .wait-sub { font-size: 14px; }
    .progress-wrap { height: 14px; }
    .alert-banner { font-size: 15px; padding: 14px 16px; margin-bottom: 24px; }
    .btn-refresh, .btn-cancel { padding: 13px 0; font-size: 16px; border-radius: 11px; }
    .actions { gap: 10px; }
  }
</style>
</head>
<body>

<nav>
  <div>
    <a href="Home.html">
      <img src="images/logo.svg" width="130">
    </a>
  </div>
  <div class="nav-actions">
    <a href="Home.html" class="btn btn-outline">Home</a>
  </div>
</nav>

<div class="main">

  <!-- LEFT CARD: Clinic Info -->
  <div class="card">
    <h2 class="clinic-title">Clinic Info</h2>
    <div class="clinic-name" id="clinicName">🏥 Loading...</div>
    <div class="clinic-location" id="clinicLocation">...</div>
    <div class="clinic-stats">
      <div class="stat-row">
        <span class="dot-green"></span>
        Status: <span id="clinicStatus">...</span>
      </div>
      <div class="stat-row">
        🕓 Avg Time / Patient: <span id="avgTime">...</span>
      </div>
    </div>
  </div>

  <!-- RIGHT CARD: Queue Info -->
  <div class="card">
    <div class="queue-numbers">
      <div>
        <div class="queue-label">Your Number</div>
        <div class="queue-number" id="yourNumber">--</div>
      </div>
      <div>
        <div class="queue-label">Now Serving</div>
        <div class="queue-number" id="nowServing">--</div>
      </div>
    </div>
    <div class="wait-section">
      <div class="wait-label">Estimated Waiting Time</div>
      <div class="wait-time" id="waitTime">-- minutes</div>
      <div class="wait-sub" id="patientsAhead">-- patients ahead of you</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="alert-banner" id="alertBanner">🔄 Loading your queue info...</div>
    <div class="actions">
      <button class="btn-refresh" id="refreshBtn">Refresh</button>
      <button class="btn-cancel" id="cancelBtn">Cancel Booking</button>
    </div>
  </div>

</div>


<script>
  // =========================================
  // STEP 1: QueueTracker Class
  // Responsible for fetching and displaying queue data
  // =========================================
  class QueueTracker {

    constructor() {
      // Save references to all HTML elements we will update
      this.clinicName     = document.getElementById("clinicName");
      this.clinicLocation = document.getElementById("clinicLocation");
      this.clinicStatus   = document.getElementById("clinicStatus");
      this.avgTime        = document.getElementById("avgTime");
      this.yourNumber     = document.getElementById("yourNumber");
      this.nowServing     = document.getElementById("nowServing");
      this.waitTime       = document.getElementById("waitTime");
      this.patientsAhead  = document.getElementById("patientsAhead");
      this.progressFill   = document.getElementById("progressFill");
      this.alertBanner    = document.getElementById("alertBanner");
    }

    // Fetch queue data from the server
    async fetchQueue() {
      try {
        const response = await fetch("/api/queue");
        const data = await response.json();

        if (data.success) {
          this.updateUI(data);  // pass data to update the page
        } else {
          this.alertBanner.textContent = "⚠️ Could not load queue info.";
        }

      } catch (error) {
        console.error("Fetch error:", error);
        this.alertBanner.textContent = "❌ Server not reachable. Try again later.";
      }
    }

    // Update the page with fresh data
    updateUI(data) {
      this.clinicName.textContent     = "🏥 " + data.clinicName;
      this.clinicLocation.textContent = data.clinicLocation;
      this.clinicStatus.textContent   = data.status;
      this.avgTime.textContent        = data.avgTimePerPatient + " min";
      this.yourNumber.textContent     = data.yourNumber;
      this.nowServing.textContent     = data.nowServing;
      this.waitTime.textContent       = data.estimatedWait + " minutes";
      this.patientsAhead.textContent  = data.patientsAhead + " patients ahead of you";

      // Update progress bar (how far along the queue you are)
      const progress = (data.nowServing / data.yourNumber) * 100;
      this.progressFill.style.width = progress + "%";

      // Update alert message based on wait time
      if (data.estimatedWait <= 10) {
        this.alertBanner.textContent = "🚗 Leave now! You're almost next.";
      } else if (data.estimatedWait <= 20) {
        this.alertBanner.textContent = "⏳ Start getting ready to leave soon.";
      } else {
        this.alertBanner.textContent = "🛋️ You still have time. Relax at home!";
      }
    }

    // Cancel the booking
    async cancelBooking() {
      const confirmed = confirm("Are you sure you want to cancel your booking?");
      if (!confirmed) return;

      try {
        const response = await fetch("/api/cancel", { method: "POST" });
        const data = await response.json();

        if (data.success) {
          alert("✅ Booking cancelled successfully!");
          window.location.href = "Home.html"; // redirect to home after cancel
        } else {
          alert("❌ Something went wrong. Please try again.");
        }

      } catch (error) {
        console.error("Cancel error:", error);
        alert("❌ Server not reachable.");
      }
    }
  }


  // =========================================
  // STEP 2: Create the tracker and load data
  // =========================================
  const tracker = new QueueTracker();

  // Load queue info as soon as page opens
  tracker.fetchQueue();


  // =========================================
  // STEP 3: Button Events
  // =========================================

  // Refresh button → fetch new data from server
  document.getElementById("refreshBtn").addEventListener("click", () => {
    tracker.fetchQueue();
  });

  // Cancel button → cancel the booking
  document.getElementById("cancelBtn").addEventListener("click", () => {
    tracker.cancelBooking();
  });


  // =========================================
  // STEP 4: Auto-refresh every 30 seconds
  // (so the page stays live without manual refresh)
  // =========================================
  setInterval(() => {
    tracker.fetchQueue();
  }, 30000); // 30000 ms = 30 seconds
</script>

</body>
</html>
