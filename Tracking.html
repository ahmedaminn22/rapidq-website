<!DOCTYPE html>
<head>
<title>RapidQ - Tracking</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #dce8f5;
    min-height: 100vh;
  }

  nav {
    background: #dce8f5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 56px;
  }

  .nav-actions { display: flex; gap: 14px; align-items: center; }

  .btn {
    padding: 12px 32px;
    border-radius: 11px;
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s;
    text-decoration: none !important;
    display: inline-block;
  }
  .btn:hover { opacity: 0.85; }
  .btn-outline { background: #2563eb; color: #fff; border: 2px solid #2563eb; }
  .btn-dark { background: #111; color: #fff; }

  .main {
    padding: 30px 56px 60px;
    display: grid;
    grid-template-columns: 1fr 2.2fr;
    gap: 28px;
    max-width: 1920px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border-radius: 28px;
    padding: 50px 40px;
  }

  .clinic-title { font-size: 40px; font-weight: 800; color: #111; margin-bottom: 20px; }
  .clinic-name { display: flex; align-items: center; gap: 10px; font-size: 23px; font-weight: 600; color: #2563eb; margin-bottom: 5px; }
  .clinic-location { font-size: 17px; color: #2563eb; margin-bottom: 36px; }
  .clinic-stats { background: #f3f4f6; border-radius: 18px; padding: 22px 24px; display: flex; flex-direction: column; gap: 16px; }
  .stat-row { display: flex; align-items: center; gap: 10px; font-size: 18px; color: #333; }
  .dot-green { width: 13px; height: 13px; background: #22c55e; border-radius: 50%; flex-shrink: 0; }
  .stat-row span { font-weight: 600; }

  .queue-numbers { display: grid; grid-template-columns: 1fr 1fr; text-align: center; margin-bottom: 40px; }
  .queue-label { font-size: 24px; font-weight: 700; color: #2563eb; margin-bottom: 4px; }
  .queue-number { font-size: 110px; font-weight: 800; color: #111; line-height: 1; }

  .wait-section { text-align: center; margin-bottom: 36px; }
  .wait-label { font-size: 24px; font-weight: 700; color: #2563eb; margin-bottom: 4px; }
  .wait-time { font-size: 60px; font-weight: 800; color: #111; margin-bottom: 6px; }
  .wait-sub { font-size: 18px; color: #2563eb; font-weight: 500; }

  .progress-wrap { background: #e5e7eb; border-radius: 999px; height: 20px; margin-bottom: 28px; overflow: hidden; }
  .progress-fill { height: 100%; width: 63%; background: #2563eb; border-radius: 999px; }

  .alert-banner { background: #f3f4f6; border-radius: 14px; padding: 20px 28px; text-align: center; font-size: 20px; color: #333; margin-bottom: 40px; }

  .actions { display: flex; justify-content: flex-end; gap: 18px; }
  .btn-refresh { background: #fff; color: #111; border: 2px solid #ccd6e0; padding: 16px 40px; border-radius: 14px; font-size: 20px; font-weight: 600; cursor: pointer; }
  .btn-cancel { background: #e02020; color: #fff; border: none; padding: 16px 40px; border-radius: 14px; font-size: 20px; font-weight: 600; cursor: pointer; }
  .btn-refresh:hover { background: #f3f4f6; }
  .btn-cancel:hover { background: #c01a1a; }




  @media (max-width: 480px) {
    nav { padding: 14px 16px; }
    nav img { width: 130px !important; }
    .btn { padding: 8px 14px; font-size: 14px; }
    .main { padding: 14px 14px 30px; gap: 14px; }
    .card { padding: 22px 18px; border-radius: 16px; }
    .clinic-title { font-size: 22px; margin-bottom: 12px; }
    .clinic-name { font-size: 17px; }
    .clinic-location { font-size: 13px; margin-bottom: 18px; }
    .queue-label { font-size: 18px; }
    .queue-number { font-size: 64px; }
    .wait-label { font-size: 18px; }
    .wait-time { font-size: 36px; }
    .wait-sub { font-size: 14px; }
    .progress-wrap { height: 14px; }
    .alert-banner { font-size: 15px; padding: 14px 16px; margin-bottom: 24px; }
    .btn-refresh, .btn-cancel { padding: 13px 0; font-size: 16px; border-radius: 11px; }
    .actions { gap: 10px; }
  }
</style>
</head>
<body>

<nav>
  <div>
    <img src="images/logo.svg" width="130">
  </div>
  <div class="nav-actions">
    <a href="Home.html" class="btn btn-outline">Home</a>
    
  </div>
</nav>

<div class="main">
  <div class="card">
    <h2 class="clinic-title">Clinc Info</h2>
    <div class="clinic-name">🏥 Dr. Ahmed Clinic</div>
    <div class="clinic-location">Smouha, Alexandria</div>
    <div class="clinic-stats">
      <div class="stat-row">
        <span class="dot-green"></span>
        Status: On Track
      </div>
      <div class="stat-row">
        🕓 Avg Time / Patient: <span>5 min</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="queue-numbers">
      <div>
        <div class="queue-label">Your Number</div>
        <div class="queue-number">27</div>
      </div>
      <div>
        <div class="queue-label">Now Serving</div>
        <div class="queue-number">20</div>
      </div>
    </div>
    <div class="wait-section">
      <div class="wait-label">Estimated Wating Time</div>
      <div class="wait-time">35 minutes</div>
      <div class="wait-sub">7 patients ahead of you</div>
    </div>
    <div class="progress-wrap"><div class="progress-fill"></div></div>
    <div class="alert-banner">🚗 Leave now to arrive on time...</div>
    <div class="actions">
      <button class="btn-refresh">Refresh</button>
      <button class="btn-cancel">Cancel Booking</button>
    </div>
  </div>
</div>

</body>
</html>
