<!DOCTYPE html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RapidQ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    font-size: 20px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #dce8f5;
    min-height: 100vh;
  }

  nav {
    background: #dce8f5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.1rem 2.8rem;
  }
  
  .logo svg { width: 2.2rem; height: 2.2rem; }
  .logo sup { font-size: 0.5rem; font-weight: 400; color: #555; vertical-align: super; }
  .nav-actions { display: flex; gap: 0.7rem; }
  .btn {
    padding: 0.6rem 1.6rem;
    border-radius: 0.55rem;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-outline { background: #fff; color: #111; border: 0.1rem solid #ccd6e0; }
  .btn-dark { background: #111; color: #fff; }

  .main {
    padding: 1.5rem 2.8rem 3rem;
    display: grid;
    grid-template-columns: 1fr 2.2fr;
    gap: 1.4rem;
    max-width: 1920px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border-radius: 1.4rem;
    padding: 2.5rem 2rem;
  }

  .clinic-title { font-size: 2rem; font-weight: 800; color: #111; margin-bottom: 1rem; }
  .clinic-name { display: flex; align-items: center; gap: 0.5rem; font-size: 1.15rem; font-weight: 600; color: #2563eb; margin-bottom: 0.25rem; }
  .clinic-location { font-size: 0.85rem; color: #2563eb; margin-bottom: 1.8rem; }
  .clinic-stats { background: #f3f4f6; border-radius: 0.9rem; padding: 1.1rem 1.2rem; display: flex; flex-direction: column; gap: 0.8rem; }
  .stat-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: #333; }
  .dot-green { width: 0.65rem; height: 0.65rem; background: #22c55e; border-radius: 50%; flex-shrink: 0; }
  .stat-row span { font-weight: 600; }

  .queue-numbers { display: grid; grid-template-columns: 1fr 1fr; text-align: center; margin-bottom: 2rem; }
  .queue-label { font-size: 1.2rem; font-weight: 700; color: #2563eb; margin-bottom: 0.2rem; }
  .queue-number { font-size: 5.5rem; font-weight: 800; color: #111; line-height: 1; }

  .wait-section { text-align: center; margin-bottom: 1.8rem; }
  .wait-label { font-size: 1.2rem; font-weight: 700; color: #2563eb; margin-bottom: 0.2rem; }
  .wait-time { font-size: 3rem; font-weight: 800; color: #111; margin-bottom: 0.3rem; }
  .wait-sub { font-size: 0.9rem; color: #2563eb; font-weight: 500; }

  .progress-wrap { background: #e5e7eb; border-radius: 999px; height: 1rem; margin-bottom: 1.4rem; overflow: hidden; }
  .progress-fill { height: 100%; width: 63%; background: #2563eb; border-radius: 999px; }

  .alert-banner { background: #f3f4f6; border-radius: 0.7rem; padding: 1rem 1.4rem; text-align: center; font-size: 1rem; color: #333; margin-bottom: 2rem; }

  .actions { display: flex; justify-content: flex-end; gap: 0.9rem; }
  .btn-refresh { background: #fff; color: #111; border: 0.1rem solid #ccd6e0; padding: 0.8rem 2rem; border-radius: 0.7rem; font-size: 1rem; font-weight: 500; cursor: pointer; }
  .btn-cancel { background: #e02020; color: #fff; border: none; padding: 0.8rem 2rem; border-radius: 0.7rem; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .btn-refresh:hover { background: #f3f4f6; }
  .btn-cancel:hover { background: #c01a1a; }
</style>
</head>
<body>

<nav>
 <div>
  <img src="images/logo.svg"
  width="200"
  >

 </div>
  <div class="nav-actions">
    <button class="btn btn-outline">Home</button>
    <button class="btn btn-dark">Logout</button>
  </div>
</nav>

<div class="main">
  <div class="card">
    <h2 class="clinic-title">Clinc Info</h2>
    <div class="clinic-name">🏥 Dr. Ahmed Clinic</div>
    <div class="clinic-location">Smouha, Alexandria</div>
    <div class="clinic-stats">
      <div class="stat-row">
        <span class="dot-green"></span>
        Status: On Track
      </div>
      <div class="stat-row">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        Avg Time / Patient: <span>5 min</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="queue-numbers">
      <div>
        <div class="queue-label">Your Number</div>
        <div class="queue-number">27</div>
      </div>
      <div>
        <div class="queue-label">Now Serving</div>
        <div class="queue-number">20</div>
      </div>
    </div>
    <div class="wait-section">
      <div class="wait-label">Estimated Wating Time</div>
      <div class="wait-time">35 minutes</div>
      <div class="wait-sub">7 patients ahead of you</div>
    </div>
    <div class="progress-wrap"><div class="progress-fill"></div></div>
    <div class="alert-banner">🚗 Leave now to arrive on time...</div>
    <div class="actions">
      <button class="btn-refresh">Refresh</button>
      <button class="btn-cancel">Cancel Booking</button>
    </div>
  </div>
</div>

</body>
</html>
