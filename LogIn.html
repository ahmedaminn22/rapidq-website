<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background-color: #E4F1FA;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .logo {
        text-align: center;
        margin-bottom: 30px;
    }

    .logo img {
        height: 45px;
    }

    .user {
        display: flex;
        background-color: #ffffff;
        border-radius: 50px;
        padding: 5px;
        margin-bottom: 25px;
        width: 480px;
    }

    .user button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        background-color: transparent;
        color: #B6BCC1;
        transition: 0.3s;
    }

    .user button.active {
        background-color: #0573E4;
        color: white;
    }

    form {
        display: flex;
        flex-direction: column;
        width: 480px;
    }

    .content input {
        width: 100%;
        padding: 18px 25px;
        border: none;
        border-radius: 50px;
        background-color: #ffffff;
        font-size: 15px;
        color: #000000;
        outline: none;
        margin-bottom: 15px;
    }

    .content input::placeholder {
        color: #B6BCC1;
    }

    .options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        padding: 0 5px;
    }

    .options label {
        color: #0573E4;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .options a {
        color: #0573E4;
        font-size: 14px;
        text-decoration: none;
    }

    .button {
        display: flex;
        justify-content: space-between;
        gap: 15px;
    }

    .button button {
        flex: 1;
        padding: 15px;
        border: none;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        background-color: #0573E4;
        color: white;
        transition: 0.3s;
    }

    .button button:hover {
        background-color: #004D93;
    }
  </style>
</head>
<body>

  <div class="logo">
    <img src="images/logo.svg" alt="RapidQ Logo">
  </div>

  <div class="user">
    <button class="active" onclick="setActive(this)">Patient</button>
    <button onclick="setActive(this)">Doctor</button>
  </div>

  <form action="Home.html">
    <div class="content">
      <input type="email" required placeholder="Enter your email">
      <input type="password" required placeholder="Enter your password" minlength="8">
    </div>
    <div class="options">
      <label>
        <input type="checkbox"> Remember me
      </label>
      <a href="forgot.html">Forgot Password?</a>
    </div>
    <div class="button">
      <button type="button" onclick="window.location.href='SignUp.html'">Sign up?</button>
      <button type="submit">Login</button>
    </div>
  </form>

  <script>
    function setActive(btn) {
        document.querySelectorAll('.user button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
  </script>

</body>
</html>
