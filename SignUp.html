<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background-color: #E4F1FA;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .logo {
        text-align: center;
        margin-bottom: 30px;
    }

    .logo img {
        height: 45px;
    }

    .user {
        display: flex;
        background-color: #ffffff;
        border-radius: 50px;
        padding: 5px;
        margin-bottom: 25px;
        width: 480px;
    }

    .user button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        background-color: transparent;
        color: #B6BCC1;
        transition: 0.3s;
    }

    .user button.active {
        background-color: #0573E4;
        color: white;
    }

    form {
        display: flex;
        flex-direction: column;
        width: 480px;
        gap: 15px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
        width: 100%;
        padding: 18px 25px;
        border: none;
        border-radius: 50px;
        background-color: #ffffff;
        font-size: 15px;
        color: #000000;
        outline: none;
    }

    input::placeholder {
        color: #B6BCC1;
    }

    #extra input {
        width: 100%;
        padding: 18px 25px;
        border: none;
        border-radius: 50px;
        background-color: #ffffff;
        font-size: 15px;
        color: #000000;
        outline: none;
    }

    .button {
        display: flex;
        justify-content: center;
    }

    .button button {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        background-color: #0573E4;
        color: white;
        transition: 0.3s;
    }

    .button button:hover {
        background-color: #004D93;
    }
</style>
</head>

<body>

<div class="logo">
    <img src="images/logo.svg" alt="RapidQ Logo">
</div>

<div class="user">
    <button class="active" onclick="setActive(this); showPatient()">Patient</button>
    <button onclick="setActive(this); showDoctor()">Doctor</button>
</div>

<form id="form" action="Home.html">
    <input type="text" placeholder="Enter your first name" required>
    <input type="text" placeholder="Enter your last name" required>
    <input type="email" placeholder="Enter your email" required>
    <input type="password" placeholder="Enter your password" required>
    <input type="password" placeholder="Confirm your password" required>

    <div id="extra"></div>

    <div class="button">
        <button type="submit">Sign up</button>
    </div>
</form>

<script>
    function setActive(btn) {
        document.querySelectorAll('.user button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function showPatient() {
        document.getElementById("extra").innerHTML = "";
    }

    function showDoctor() {
        document.getElementById("extra").innerHTML =
            '<input type="text" placeholder="Enter your specialization" required>';
    }
</script>

</body>
</html>
